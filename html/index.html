<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>FocusTracker</title>
        <link rel="stylesheet" href="../css/general-styles.css">
        <link rel="stylesheet" href="../css/nav-styles.css">
        <link rel="stylesheet" href="../css/stopwatch-styles.css">
        <link rel="stylesheet" href="../css/task-styles.css">
        <link rel="stylesheet" href="../css/reports-styles.css">
        <link rel="stylesheet" href="../css/normalize.css">
    </head>
    <body>
        <main>
            <!-- NAVBAR -->
            <nav id="nav-menu" class="">
                <ul class="nav-options-container">
                    <li id="show-stopwatch-window"
                        class="nav-option left-option">
                        <span class="nav-text">Stopwatch</span>
                    </li>
                    <li id="show-reports-window"
                        class="nav-option right-option">
                        <span class="nav-text">Reports</span>
                    </li>
                </ul>
            </nav>

            <!-- STOPWATCH WINDOW -->
            <div id ="stopwatch-window" class="window">
                <!-- STOPWATCH -->
                <div class="nav-options-container clock-size-options hide">
                    <button id="shrink-clock-size-btn" class="action-btn discreet-btn" title="Shrink clock size">
                        <img class="btn-icon"
                            src="../assets/icons/shrink_size_icon.png">
                    </button>
                    <button id="enlarge-clock-size-btn" class="action-btn discreet-btn" title="Enlarge clock size">
                        <img class="btn-icon"
                            src="../assets/icons/enlarge_size_icon.png">
                        </button>
                </div>
                <div class="clock-container">
                    <!-- HOURS -->
                    <span id="hours-text" class="time-unit-text">
                        00
                    </span>

                    <!-- MINUTES -->
                    <span id="minutes-text" class="time-unit-text">
                        00                        
                    </span>

                    <!-- SECONDS -->
                    <span id="seconds-text" class="time-unit-text">
                        00                        
                    </span>
                </div>
                <!-- BUTTONS TO CONTROL STOPWATCH -->
                <div class="action-btn-container">
                    <!--RESTART TIME -->
                    <button id="restart-time-btn" class="action-btn" title="Restart stopwatch">
                        <img class="btn-icon"
                            src="../assets/icons/restart_time_icon.png">
                    </button>
                    <!--START STOP BUTTON -->
                    <button id="start-stop-btn" class="action-btn" title="Start/stop stopwatch">
                        <img class="btn-icon"
                            src="../assets/icons/play_icon.png">
                    </button>
                    <!--FINISH FOCUS TRACK -->
                    <button id="finish-track-btn" class="action-btn hide" title="End focus track (restart stopwatch)">
                        <img class="btn-icon"
                            src="../assets/icons/finish_track_icon.png">
                    </button>
                </div>
                <!-- TASKS -->
                <div class="tasks-section">
                    <div class="task-on-focus-container hide">
                        <h2 class="title">Focusing on:</h2>
                        <p id="task-on-focus" class="task-text">Something</p>
                    </div>
                    <ul class="tasks-container ">
                        <!-- ADD NEW TASK -->
                        <li id="add-new-task" class="task">
                            <span class="task-text">New Task</span><img class="task-icon" src="../assets/icons/add_task_icon.png">
                        </li>
                    </ul>
                </div>
            </div>

            <!-- REPORTS WINDOW -->
            <div id ="reports-window" class="window">
                <!-- TIME INTERVAL OPTIONS -->
                <div class="time-interval-options-nav">
                    <span class="time-interval-option-text">DAY</span>
                    <div class="current-time-interval-container">
                        <button id="previous-time-interval-btn" class="action-btn">
                            <img class="btn-icon"
                            src="../assets/icons/left_arrow_icon.png">
                        </button>
                        <span id="current-interval-text" class="time-interval-option-text"></span>
                        <button id="next-time-interval-btn" class="action-btn">
                            <img class="btn-icon"
                            src="../assets/icons/right_arrow_icon.png">
                        </button>
                    </div>
                    <div class="time-interval-options">
                        <button id="day-interval-option-btn" class="time-interval-option-btn" title="Review reports by day">DAY</button>
                        <button id="week-interval-option-btn" class="time-interval-option-btn" title="Review last 7 days reports">WEEK</button>
                        <button id="month-interval-option-btn" class="time-interval-option-btn" title="Review last 30 days reports">MONTH</button>
                    </div>
                </div>
                <!-- CHARTS -->
                <div class="charts-container">
                    <div class="inactivity-message-container hide">
                        <img src="../assets/icons/spleepy_dog_icon.png">
                        <span>There is not activity to report</span>
                    </div>
                    <div class="canvas-container">
                        <canvas id="current-chart"></canvas>
                    </div>
                    <div class="chart-data-list-container">
                        <ul class="chart-data-list-panel">
                        </ul>
                    </div>
                </div>
            </div>
        </main>

        <script src="../node_modules/chart.js/dist/chart.umd.js" defer></script>
        <script src="../node_modules/chartjs-plugin-autocolors/dist/chartjs-plugin-autocolors.min.js"></script>
        <script src="../js/variables.js" defer></script>
        <script src="../js/navbar-logic.js" defer></script>
        <script src="../js/stopwatch-logic.js" defer></script>
        <script src="../js/taskPanel-logic.js" defer></script>
        <script src="../js/reports-logic.js" defer></script>
    </body>
</html>
